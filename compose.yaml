services:
  db:
    image: postgres:16.4-alpine3.20
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crypto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_intel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto} -d ${POSTGRES_DB:-crypto_intel}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    restart: unless-stopped
    tmpfs:
      - /tmp
      - /run
      - /var/run/postgresql

  redis:
    image: redis:7.4-alpine3.20
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT required}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crypto_intel}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      BLOCKCHAIN_PROVIDER: ${BLOCKCHAIN_PROVIDER:?BLOCKCHAIN_PROVIDER required}
      BLOCKCHAIN_API_KEY: ${BLOCKCHAIN_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:?AI_PROVIDER required}
      AI_API_KEY: ${AI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-https://localhost}
      APP_SECRET: ${APP_SECRET:?APP_SECRET required}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      INITDATA_MAX_AGE_SECONDS: ${INITDATA_MAX_AGE_SECONDS:-300}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS required}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      MAX_WALLETS_PER_USER: ${MAX_WALLETS_PER_USER:-20}
      MAX_ALERTS_PER_USER: ${MAX_ALERTS_PER_USER:-100}
      MAX_SESSIONS_PER_USER: ${MAX_SESSIONS_PER_USER:-5}
      RATE_LIMIT_TRUSTED_PROXIES: ${RATE_LIMIT_TRUSTED_PROXIES:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend
      - frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
          pids: 200

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT required}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crypto_intel}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      BLOCKCHAIN_PROVIDER: ${BLOCKCHAIN_PROVIDER:?BLOCKCHAIN_PROVIDER required}
      BLOCKCHAIN_API_KEY: ${BLOCKCHAIN_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:?AI_PROVIDER required}
      AI_API_KEY: ${AI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APP_SECRET: ${APP_SECRET:?APP_SECRET required}
      MAX_WALLETS_PER_USER: ${MAX_WALLETS_PER_USER:-20}
    networks:
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
          pids: 100

  bot:
    build:
      context: .
      dockerfile: infra/Dockerfile.bot
    depends_on:
      - api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT required}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crypto_intel}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN required}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-https://localhost}
      APP_SECRET: ${APP_SECRET:?APP_SECRET required}
    networks:
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["bot"]

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:8080"
    networks:
      - frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
          pids: 50

  migrate:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT required}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crypto_intel}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      BLOCKCHAIN_PROVIDER: ${BLOCKCHAIN_PROVIDER:-mock}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      APP_SECRET: ${APP_SECRET:?APP_SECRET required}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend
    profiles: ["migrate"]

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
